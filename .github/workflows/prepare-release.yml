name: Prepare Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop

      - name: Generate Changelog and Version Bump
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          git-branch: develop
          skip-commit: true
          skip-tag: true
          output-file: 'CHANGELOG.md'
          version-file: 'VERSION'
          fallback-version: '0.1.0'

      - name: Sync Go Version File
        run: |
          # Sync the computed version into the Go binary config
          # $VERSION contains the new version without the v prefix
          VERSION="${{ steps.changelog.outputs.version }}"
          if [ -n "$VERSION" ]; then
            sed -i "s/Version = \".*\"/Version = \"$VERSION\"/" internal/config/version.go
          fi

      - name: Create Release Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: "release/v${{ steps.changelog.outputs.version }}"
          base: main
          title: "chore: release v${{ steps.changelog.outputs.version }}"
          body: |
            This PR was automatically generated to prepare for release `v${{ steps.changelog.outputs.version }}`.
            
            ${{ steps.changelog.outputs.clean_changelog }}
          commit-message: "chore: bump version and generate changelog for v${{ steps.changelog.outputs.version }}"
